name: Cleanup feat/spa-columns-toggle-and-download
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/cleanup-cols.yml
permissions:
  contents: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          for b in feat/spa-columns-toggle-and-download; do
            gh api --method DELETE "repos/${{ github.repository }}/git/refs/heads/$b" 2>&1 && echo "✓ $b" || echo "✗ $b"
          done
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/cleanup-cols.yml
          git commit -m "chore: remove cleanup-cols workflow"
          git push
