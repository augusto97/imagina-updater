name: One-shot cleanup of merged feature branches

# Workflow autodisparado al pushear este archivo. Borra las ramas
# feature ya mergeadas en main y luego se auto-elimina para no dejar
# basura. Diseñado para correr una sola vez tras Phase 5.

on:
  push:
    paths:
      - .github/workflows/cleanup-merged-branches.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete merged feature branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          BRANCHES=(
            chore/phpcs-sweep
            chore/remove-legacy-sdk
            feat/admin-activations
            feat/admin-api-keys
            feat/admin-dashboard
            feat/admin-logs
            feat/admin-plugin-groups
            feat/admin-plugins
            feat/admin-redesign
            feat/admin-settings
            fix/critical-issues
            fix/spa-build-css-naming
            ready/merge-phase-4-and-5
            refactor/architecture
            refactor/robustness
            chore/one-shot-branch-cleanup
          )
          for b in "${BRANCHES[@]}"; do
            echo "::group::Deleting $b"
            if gh api --method DELETE "repos/${{ github.repository }}/git/refs/heads/$b" 2>&1; then
              echo "  ✓ deleted $b"
            else
              echo "  ✗ skipped $b (not found or branch protection)"
            fi
            echo "::endgroup::"
          done

      - name: Self-delete this workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/cleanup-merged-branches.yml
          git commit -m "chore: remove one-shot branch cleanup workflow"
          git push
