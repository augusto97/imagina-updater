name: Final cleanup of cleanup branch

# Borra chore/cleanup-fix-branches (que sobrevivió porque el workflow
# previo se ejecutó CHECKED OUT en esa misma rama y no podía borrar
# su propia HEAD). Esta vez corre desde main, así que puede borrarla
# limpiamente. Luego se auto-elimina.

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/final-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete remaining cleanup branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          BRANCHES=(
            chore/cleanup-fix-branches
          )
          for b in "${BRANCHES[@]}"; do
            echo "::group::Deleting $b"
            if gh api --method DELETE "repos/${{ github.repository }}/git/refs/heads/$b" 2>&1; then
              echo "  ✓ deleted $b"
            else
              echo "  ✗ skipped $b (not found)"
            fi
            echo "::endgroup::"
          done

      - name: Self-delete this workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/final-cleanup.yml
          git commit -m "chore: remove final cleanup workflow"
          git push
