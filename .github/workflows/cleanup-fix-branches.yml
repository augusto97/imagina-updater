name: One-shot cleanup of fix branches

# Borra las ramas de los hotfixes post-merge de Fase 5
# (fix/spa-build-css-naming, fix/spa-script-type-module,
# fix/spa-relative-asset-urls) y se auto-elimina.

on:
  push:
    paths:
      - .github/workflows/cleanup-fix-branches.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete fix branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          BRANCHES=(
            fix/spa-build-css-naming
            fix/spa-script-type-module
            fix/spa-relative-asset-urls
            chore/cleanup-fix-branches
          )
          for b in "${BRANCHES[@]}"; do
            echo "::group::Deleting $b"
            if gh api --method DELETE "repos/${{ github.repository }}/git/refs/heads/$b" 2>&1; then
              echo "  ✓ deleted $b"
            else
              echo "  ✗ skipped $b (not found)"
            fi
            echo "::endgroup::"
          done

      - name: Self-delete this workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/cleanup-fix-branches.yml
          git commit -m "chore: remove one-shot fix-branches cleanup workflow"
          git push
